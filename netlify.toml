# ══════════════════════════════════════════════════════════
# MarqueX — Netlify Configuration
# ══════════════════════════════════════════════════════════

[build]
  publish = "."     # Deploy from root directory

# ── Security & PWA headers ──────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security  = "max-age=31536000; includeSubDomains"
    Content-Security-Policy    = "default-src 'self'; script-src 'self' 'unsafe-inline' https://identity.netlify.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://*.netlify.com https://*.netlify.app; frame-src 'none'"

# Service worker must be served from root with no-cache
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Type  = "application/javascript"

# Manifest
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "application/manifest+json"

# Fonts and static assets — long cache
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Images — long cache (both paths)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Redirects ───────────────────────────────────────────────
# Redirect www → marquex (update YOUR_DOMAIN when you have it)
# [[redirects]]
#   from   = "https://www.marquex.com/*"
#   to     = "https://marquex.com/:splat"
#   status = 301

# Block access to database files
[[redirects]]
  from   = "/*.db"
  to     = "/404"
  status = 404
  force  = true

[[redirects]]
  from   = "/carden/server/*"
  to     = "/404"
  status = 404
  force  = true

# SPA fallback — serve index page for any unmatched path
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
