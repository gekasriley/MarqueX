<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>

    <!-- Background radial gradient -->
    <radialGradient id="bgGrad" cx="28%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>

    <!-- Chevron primary gradient: hot orange-red at tip, deep red at base -->
    <linearGradient id="chevronGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#B81E0A"/>
      <stop offset="60%"  stop-color="#D42B16"/>
      <stop offset="100%" stop-color="#FF4422"/>
    </linearGradient>

    <!-- Chevron inner face gradient -->
    <linearGradient id="chevronInnerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8B1207"/>
      <stop offset="100%" stop-color="#B81E0A"/>
    </linearGradient>

    <!-- Bloom glow (placed behind chevron) -->
    <filter id="bloom" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>

    <!-- MarqueX wordmark metallic gradient top-to-bottom -->
    <linearGradient id="marquexGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="35%"  stop-color="#F2F2F2"/>
      <stop offset="65%"  stop-color="#C4C4C4"/>
      <stop offset="100%" stop-color="#888888"/>
    </linearGradient>

    <!-- Top stripe: solid red fading right -->
    <linearGradient id="stripeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FF4422"/>
      <stop offset="50%"  stop-color="#D42B16"/>
      <stop offset="100%" stop-color="#D42B16" stop-opacity="0"/>
    </linearGradient>

    <!-- Red rule gradient -->
    <linearGradient id="ruleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FF5533"/>
      <stop offset="30%"  stop-color="#D42B16"/>
      <stop offset="100%" stop-color="#D42B16" stop-opacity="0.2"/>
    </linearGradient>

  </defs>

  <!-- ── BACKGROUND ── -->

  <!-- Very subtle diagonal speed lines across full canvas -->
  <g opacity="0.035" stroke="#CC2200" stroke-width="1">
    <line x1="80"  y1="0" x2="230" y2="200"/>
    <line x1="120" y1="0" x2="270" y2="200"/>
    <line x1="160" y1="0" x2="310" y2="200"/>
    <line x1="200" y1="0" x2="350" y2="200"/>
    <line x1="240" y1="0" x2="390" y2="200"/>
    <line x1="280" y1="0" x2="430" y2="200"/>
    <line x1="320" y1="0" x2="470" y2="200"/>
    <line x1="360" y1="0" x2="510" y2="200"/>
    <line x1="400" y1="0" x2="550" y2="200"/>
    <line x1="440" y1="0" x2="590" y2="200"/>
    <line x1="480" y1="0" x2="630" y2="200"/>
  </g>

  <!-- Speed parallelogram texture (bottom-left depth) -->
  <polygon points="0,200 180,200 200,120 20,120" fill="#181818" opacity="0.9"/>
  <polygon points="0,200 90,200 105,155 0,155"   fill="#161616" opacity="0.9"/>

  <!-- Top accent stripe (gradient) -->
  <rect x="0" y="0" width="600" height="3" fill="url(#stripeGrad)"/>

  <!-- Bottom ghost stripe -->
  <rect x="0" y="197" width="600" height="3" fill="#D42B16" opacity="0.12"/>

  <!-- ── CHEVRON BLOOM (glow behind) ── -->
  <polygon
    points="26,46 92,100 26,154 50,154 116,100 50,46"
    fill="#D42B16"
    filter="url(#bloom)"
    opacity="0.55"/>

  <!-- Outer halo ring -->
  <polygon
    points="10,34 82,100 10,166 34,166 106,100 34,34"
    fill="none" stroke="#7A1A0A" stroke-width="1.5" stroke-linejoin="miter"/>

  <!-- Speed streaks from chevron tip toward divider -->
  <g stroke="#FF4422" stroke-linecap="round">
    <line x1="116" y1="100" x2="139" y2="88"  stroke-width="0.8" opacity="0.30"/>
    <line x1="116" y1="100" x2="140" y2="93"  stroke-width="0.8" opacity="0.35"/>
    <line x1="116" y1="100" x2="140" y2="100" stroke-width="1.0" opacity="0.40"/>
    <line x1="116" y1="100" x2="140" y2="107" stroke-width="0.8" opacity="0.35"/>
    <line x1="116" y1="100" x2="139" y2="112" stroke-width="0.8" opacity="0.30"/>
  </g>

  <!-- Primary chevron with gradient -->
  <polygon
    points="26,46 92,100 26,154 50,154 116,100 50,46"
    fill="url(#chevronGrad)"/>

  <!-- Inner face (depth cut) -->
  <polygon
    points="62,58 92,100 62,142 72,142 102,100 72,58"
    fill="url(#chevronInnerGrad)"/>

  <!-- Top leading edge highlight -->
  <polyline points="26,46 92,100"
    fill="none" stroke="#FF7755" stroke-width="1.2" opacity="0.55" stroke-linecap="round"/>
  <polyline points="50,46 116,100"
    fill="none" stroke="#FF7755" stroke-width="0.7" opacity="0.25" stroke-linecap="round"/>

  <!-- ── DIVIDER ── -->
  <line x1="140" y1="44" x2="140" y2="156" stroke="#252525" stroke-width="1"/>
  <!-- Tiny red pip at top of divider -->
  <line x1="140" y1="44" x2="140" y2="56" stroke="#D42B16" stroke-width="1" opacity="0.45"/>

  <!-- ── MarqueX TEXT ── -->
  <!-- Red offset shadow -->
  <text
    x="161" y="123"
    font-family="'Barlow', sans-serif"
    font-weight="900"
    font-size="82"
    fill="#C42010"
    opacity="0.18"
    letter-spacing="1">MarqueX</text>
  <!-- Main text with metallic gradient -->
  <text
    x="158" y="122"
    font-family="'Barlow', sans-serif"
    font-weight="900"
    font-size="82"
    fill="url(#marquexGrad)"
    letter-spacing="1">MarqueX</text>

  <!-- Red rule below MarqueX -->
  <rect x="158" y="129" width="420" height="1.5" fill="url(#ruleGrad)"/>

  <!-- ── TAGLINE TEXT ── -->
  <text
    x="160" y="151"
    font-family="Impact, 'Arial Black', Arial, sans-serif"
    font-size="14"
    fill="#D42B16"
    letter-spacing="7">PURSUE · OWN · REVERE</text>

  <!-- ── EST. DETAIL (bottom-right) ── -->
  <text
    x="570" y="184"
    font-family="'Courier New', Courier, monospace"
    font-size="8.5"
    fill="#444444"
    text-anchor="end"
    letter-spacing="2">EST. 2026</text>

</svg>
